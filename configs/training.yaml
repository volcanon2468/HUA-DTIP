seed: 42
device: cuda

training:
  encoders:
    lr: 1.0e-3
    weight_decay: 1.0e-5
    batch_size: 64
    epochs: 100
    patience: 10
    scheduler: cosine
    contrastive:
      temperature: 0.07
      projection_dim: 128

  temporal:
    lr: 1.0e-3
    weight_decay: 1.0e-5
    batch_size: 32
    epochs: 80
    patience: 10

  twin:
    lr: 1.0e-3
    weight_decay: 1.0e-5
    batch_size: 64
    epochs: 100
    patience: 10
    scheduler: cosine
    joint_finetune_lr: 2.0e-4
    sde:
      lr: 5.0e-4
      epochs: 80

  rl:
    n_episodes: 5000
    episode_length: 28
    batch_size: 256
    buffer_size: 100000
    warmup_steps: 1000
    gamma: 0.99
    tau: 0.005
    actor_lr: 3.0e-4
    critic_lr: 3.0e-4
    alpha_lr: 3.0e-4

  federated:
    n_clients: 249
    n_rounds: 50
    local_epochs: 5
    client_lr: 1.0e-3
    fedprox_mu: 0.01

model:
  rl:
    actor_hidden: 256
    critic_hidden: 256

encoders:
  batch_size: 64

wandb:
  project: hua-dtip
  entity: null
  log_every: 10

checkpoints:
  dir: checkpoints/
  results_dir: results/
