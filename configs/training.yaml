# Training loop parameters

seed: 42
device: cuda    # or cpu

encoders:
  lr: 1.0e-3
  weight_decay: 1.0e-5
  batch_size: 64
  epochs: 100
  patience: 10
  scheduler: cosine

  contrastive:
    temperature: 0.07
    projection_dim: 128

temporal:
  lr: 1.0e-3
  weight_decay: 1.0e-5
  batch_size: 32
  epochs: 80
  patience: 10

twin:
  lr: 1.0e-3
  weight_decay: 1.0e-5
  batch_size: 64
  epochs: 100
  patience: 10
  scheduler: cosine
  joint_finetune_lr: 2.0e-4

  sde:
    lr: 5.0e-4
    epochs: 80

rl:
  episodes: 5000
  horizon: 28        # days per episode
  batch_size: 256
  replay_buffer_size: 100000
  warmup_steps: 1000
  update_every: 1
  checkpoint_every: 500
  lr_actor: 3.0e-4
  lr_critic: 3.0e-4
  lr_alpha: 3.0e-4
  gamma: 0.99
  tau: 0.005         # soft target update

federated:
  rounds: 50
  clients_per_round: -1    # -1 = all available
  local_epochs: 5
  lr: 1.0e-3

wandb:
  project: hua-dtip
  entity: null       # set your wandb entity here
  log_every: 10      # steps

checkpoints:
  dir: checkpoints/
  results_dir: results/
