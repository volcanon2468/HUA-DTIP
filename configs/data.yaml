paths:
  mhealth: data/raw/mhealth
  pamap2: data/raw/pamap2
  ppg_4week: data/raw/ppg_4week
  stroke_rehab: data/raw/stroke_rehab
  capture24: data/raw/capture24
  mex: data/raw/mex
  processed: data/processed

window:
  size: 1000
  stride: 500
  sample_rate: 50

normalization:
  method: per_subject_zscore

missing_data:
  interpolate_threshold: 0.10
  discard_threshold: 0.30

hrv:
  features: [SDNN, RMSSD, LF, HF, LF_HF_ratio]

mhealth:
  n_subjects: 10
  n_imu_channels: 9
  n_ecg_channels: 2
  n_activity_classes: 12

pamap2:
  n_subjects: 9
  subject_ids: [101, 102, 103, 104, 105, 106, 107, 108, 109]
  n_activity_classes: 18

ppg_4week:
  n_subjects: 49
  n_days: 28

capture24:
  n_subjects: 151

mex:
  n_subjects: 30
